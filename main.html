<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="page-content"></div>
    <button id="stamp" onclick="debugCheckStatus()">
        デバッグ用スコア確認
    </button><br>
    <button id="stamp" onclick="debugResetAll()">
        デバッグ用セーブ情報削除
    </button>
    <script>
        const currentURL = window.location.search;
        var params = new URLSearchParams(currentURL);
        var pageID = params.get('page');
        console.log(pageID)
        var validPages = ['page1', 'page2', 'page3'];
        const correctAnswer = {
            "page1":"1",
            "page2":"2",
            "page3":"3",
        }
        window.addEventListener('DOMContentLoaded', async () => {
            if (pageID && validPages.includes(pageID)) {
                // コンテンツの読み込み
                await loadContent(pageID);
                // スタンプボタンを表示
                document.getElementById('stamp').style.display = 'block';
            } else {
                await loadContent("praise");
                getStamps();
            }
        });
        
        // 3. 外部HTMLの読み込み関数
        async function loadContent(id) {
            const area = document.getElementById('page-content');
            try {
                // 同じ階層の contents フォルダから取得する場合
                const response = await fetch(`./pages/${id}.html`);
                if (!response.ok) throw new Error('Network response was not ok');
                const html = await response.text();
                area.innerHTML = html;
            } catch (error) {
                area.innerHTML = '<p>コンテンツの読み込みに失敗しました。</p>';
                console.error(error);
            }
        }
        function stampDown(num) {
            if(!pageID) {
                alert("不正なリンクです！")
                return 0
            }
            let stamps = JSON.parse(localStorage.getItem('stamps') || '[]');
            var hasAnswered = stamps.some(s => s.page === pageID);
            if(!hasAnswered) {
                stamps.push({"page":pageID, "answer":num});
                localStorage.setItem('stamps', JSON.stringify(stamps));
            }
            else {
                alert('このスタンプは既に押してあります！')
            }
        }
        function getStamps() {
            let stamps = JSON.parse(localStorage.getItem('stamps') || '[]');
            var table = document.getElementById("stampList");
            var scoreboard = document.getElementById("scoreboard");
            table.innerHTML = "";
            var content = "<tr>";
            var score = 0;
            stamps.forEach(e => {
                var page = e["page"];
                var answer = e["answer"];
                if (correctAnswer[page] == answer) {score += 1}
                content += `<td>${page}</td>`;
            });
            content += "</tr>";
            table.insertAdjacentHTML("beforeend", content);
            scoreboard.innerHTML(`<p><strong>${score}問正解でした！</strong></p>`);
        }

        /**
 * テスト用：現在のスタンプ状況と正誤判定をコンソールに出力する
 */
function debugCheckStatus() {
    const stamps = JSON.parse(localStorage.getItem('stamps') || '[]');
    console.log("--- スタンプラリー状況確認 ---");
    
    if (stamps.length === 0) {
        console.log("まだスタンプがありません。");
        return;
    }

    let score = 0;
    stamps.forEach((s, index) => {
        const isCorrect = (correctAnswer[s.page] == s.answer);
        if (isCorrect) score++;

        console.log(`[${index + 1}] ページ: ${s.page}`);
        console.log(`    - ユーザーの回答: ${s.answer}`);
        console.log(`    - 設定された正解: ${correctAnswer[s.page]}`);
        console.log(`    - 判定: ${isCorrect ? "○ 正解" : "× 不正解"}`);
    });

    console.log("------------------------------");
    console.log(`合計スコア: ${score} / ${stamps.length}`);
}

/**
 * テスト用：全てのストレージを消去してリセットする
 */
function debugResetAll() {
    if(confirm("全てのスタンプ記録を削除してリセットしますか？")) {
        localStorage.removeItem('stamps');
        location.reload(); // ページをリロードして反映
    }
}
    </script>
</body>
</html>
